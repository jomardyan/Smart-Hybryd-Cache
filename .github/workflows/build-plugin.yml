name: Build Plugin ZIP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional plugin version for the packaged ZIP'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build WordPress plugin artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify PHP and install ZIP utility
        run: |
          php -v
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Resolve package version
        id: package-version
        shell: bash
        run: |
          version="${{ github.event.release.tag_name || inputs.version || '' }}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Bump plugin metadata for release package
        if: steps.package-version.outputs.version != ''
        run: php tools/bump-plugin-version.php "${{ steps.package-version.outputs.version }}"

      - name: Build standalone plugin ZIP
        run: make build

      - name: Build versioned plugin ZIP
        if: steps.package-version.outputs.version != ''
        run: make build-versioned

      - name: Upload installable plugin artifact
        # Upload the plugin source directory (not the built ZIP) so the artifact
        # ZIP downloaded from the GitHub Actions UI contains the plugin files
        # directly at the archive root. Uploading the built ZIP would produce a
        # nested ZIP (smart-hybrid-cache.zip inside smart-hybrid-cache.zip),
        # which WordPress rejects with "No valid plugins were found".
        uses: actions/upload-artifact@v4
        with:
          name: smart-hybrid-cache
          path: smart-hybrid-cache/
          if-no-files-found: error

      - name: Attach ZIPs to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/smart-hybrid-cache.zip \
            "build/smart-hybrid-cache-${{ steps.package-version.outputs.version }}.zip" \
            --clobber
