name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PHP ${{ matrix.php-version }} lint
        run: |
          docker run --rm \
            -v "$PWD:/app" \
            -w /app \
            php:${{ matrix.php-version }}-cli \
            sh -c 'find smart-hybrid-cache -name "*.php" -type f -print0 | sort -z | xargs -0 -n1 php -l'
